version: '3.8'

services:
  # 1. Cơ sở dữ liệu PostgreSQL
  postgres-db:
    image: postgres:15-alpine
    container_name: hust_ems_db
    restart: always
    environment:
      POSTGRES_USER: ems_admin
      POSTGRES_PASSWORD: ems_password123
      POSTGRES_DB: hust_ems
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount init SQL (chỉ chạy lần đầu khi tạo DB)
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems_admin -d hust_ems"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis (cache)
  redis-cache:
    image: redis:7-alpine
    container_name: hust_ems_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: