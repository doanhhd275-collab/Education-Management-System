<style>

<body>

<h1>Class Diagram — UC04.2: Class Management</h1>
<p class="sub">Refactored: Stateless Controller & Boundary Actors</p>

<!--
  TeacherView    «boundary» : nA=0, nM=3  → 126
  StudentView    «boundary» : nA=0, nM=3  → 126
  ClassManager   «control»  : nA=0, nM=12 → 279
  Class          «entity»   : nA=5, nM=3  → 194
  LessonReport   «entity»   : nA=4, nM=2  → 160
  Enrollment     «entity»   : nA=5, nM=2  → 177

  TeacherView  : (20, 20)
  StudentView  : (20, 180)
  ClassManager : (250, 40)
  Class        : (570, 20)
  Enrollment   : (570, 300)
  LessonReport : (810, 20)
-->
<svg width="1070" height="520" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <marker id="mf" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto">
    <polyline points="0,0 10,4.5 0,9" fill="none" stroke="#333" stroke-width="1.4"/>
  </marker>
</defs>

<line x1="20" y1="79" x2="220" y2="79" stroke="#333" stroke-width="1.5"/>

<text x="120" y="52" font-size="13" font-weight="bold" text-anchor="middle">TeacherView</text>
<text x="26" y="104" font-size="11">+ viewClassRoster() : void</text>
<text x="26" y="121" font-size="11">+ markAttendance() : void</text>
<text x="26" y="138" font-size="11">+ addLessonReport() : void</text>

<!-- ════ 2. STUDENTVIEW «boundary» ════ -->
<rect x="20" y="180" width="200" height="126" fill="#fff" stroke="#333" stroke-width="1.5"/>

<line x1="20" y1="239" x2="220" y2="239" stroke="#333" stroke-width="1.5"/>

<text x="26" y="281" font-size="11">+ viewAttendance() : void</text>

<text x="576" y="376" font-size="11">+ studentID : String</text>
<text x="576" y="393" font-size="11">+ classID : String</text>

<rect x="810" y="20" width="200" height="160" fill="#fff" stroke="#333" stroke-width="1.5"/>
<line x1="810" y1="62" x2="1010" y2="62" stroke="#333" stroke-width="1.5"/>
<line x1="810" y1="138" x2="1010" y2="138" stroke="#333" stroke-width="1.5"/>

</svg>

<div class="legend">
  <span><b>Access modifiers:</b> &nbsp; <b>+</b> public &nbsp;|&nbsp; <b>−</b> private</span>
  <span>——&gt; Directed Association (open V)</span>
  <span><b>1 &nbsp; 0..*</b> — Multiplicity</span>
  <span><b>«boundary»</b> / <b>«control»</b> / <b>«entity»</b></span>
</div>
