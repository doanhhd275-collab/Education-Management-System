<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>UC04 – Class Diagram: Class Management</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Times New Roman', Times, serif; background: #f0ede8; padding: 24px 16px; }
  h1   { text-align: center; font-size: 17px; font-weight: bold; margin-bottom: 4px; color: #111; }
  .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 20px; }
  svg  { display: block; margin: 0 auto; background: #fff;
         border: 1.5px solid #999; box-shadow: 3px 3px 10px rgba(0,0,0,.15); }
  .legend {
    width: 1050px; margin: 14px auto 0;
    display: flex; gap: 22px; flex-wrap: wrap;
    font-size: 11px; color: #444;
    font-family: 'Times New Roman', Times, serif;
    border-top: 1px solid #bbb; padding-top: 10px;
  }
  .legend b { color: #111; }
</style>
</head>
<body>

<h1>Class Diagram — UC04: Class Management</h1>
<p class="sub">Main Actors: Teacher, StudentActor &nbsp;|&nbsp; Priority: High</p>

<!--
  ════════════════════════════════════════════════════════
  h = 42 + nA*17 + 8 + nM*17 + 8

  Teacher       «actor»   nA=2 nM=6 → 42+34+8+102+8 = 194
  StudentActor  «actor»   nA=2 nM=3 → 42+34+8+51+8  = 143
  ClassManager  «control» nA=4 nM=8 → 42+68+8+136+8 = 262
  LessonReport  «entity»  nA=7 nM=1 → 42+119+8+17+8 = 194
  Enrollment    «entity»  nA=7 nM=2 → 42+119+8+34+8 = 211
  Class         «entity»  nA=6 nM=2 → 42+102+8+34+8 = 194

  COLUMNS:
    Col1  x=20..212   w=192  Teacher (top) / StudentActor (bottom)
    ChanA x=228
    Col2  x=244..494  w=250  ClassManager
    ChanB x=510
    Col3  x=526..726  w=200  LessonReport (top) / Enrollment (bottom)
    ChanC x=742
    Col4  x=758..948  w=190  Class

  POSITIONS (x, y):
    Teacher      : (20,  30)   bottom=224
    StudentActor : (20, 380)   bottom=523
    ClassManager : (244,185)   bottom=447
    LessonReport : (526, 30)   bottom=224
    Enrollment   : (526,440)   bottom=651
    Class        : (758,230)   bottom=424

  Canvas: 965 × 680
  ════════════════════════════════════════════════════════
-->
<svg width="965" height="680" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <marker id="mf" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto">
    <polyline points="0,0 10,4.5 0,9" fill="none" stroke="#333" stroke-width="1.4"/>
  </marker>
  <marker id="md" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto">
    <polyline points="0,0 10,4.5 0,9" fill="none" stroke="#333" stroke-width="1.4"/>
  </marker>
</defs>

<!-- ════ 1. TEACHER «actor»  x=20 y=30 w=192 h=194 ════
     div1=72, div2=114
     attrs: 89,106  methods: 131,148,165,182,199,216 -->
<rect x="20"  y="30"  width="192" height="194" fill="#fff" stroke="#333" stroke-width="1.5"/>
<line x1="20"  y1="72"  x2="212" y2="72"  stroke="#333" stroke-width="1.5"/>
<line x1="20"  y1="114" x2="212" y2="114" stroke="#333" stroke-width="1.5"/>
<text x="116" y="45"  font-size="10.5" font-style="italic" text-anchor="middle">«actor»</text>
<text x="116" y="62"  font-size="13"   font-weight="bold"  text-anchor="middle">Teacher</text>
<text x="26"  y="89"  font-size="11">+ teacherID : String</text>
<text x="26"  y="106" font-size="11">+ name : String</text>
<text x="26"  y="131" font-size="11">+ markAttendance() : void</text>
<text x="26"  y="148" font-size="11">+ updateAttendance() : void</text>
<text x="26"  y="165" font-size="11">+ viewAttendance() : List</text>
<text x="26"  y="182" font-size="11">+ enterGrade() : void</text>
<text x="26"  y="199" font-size="11">+ viewClassGrades() : List</text>
<text x="26"  y="216" font-size="11">+ checkStudents() : List</text>

<!-- ════ 2. STUDENTACTOR «actor»  x=20 y=380 w=192 h=143 ════
     div1=422, div2=464
     attrs: 439,456  methods: 481,498,515 -->
<rect x="20"  y="380" width="192" height="143" fill="#fff" stroke="#333" stroke-width="1.5"/>
<line x1="20"  y1="422" x2="212" y2="422" stroke="#333" stroke-width="1.5"/>
<line x1="20"  y1="464" x2="212" y2="464" stroke="#333" stroke-width="1.5"/>
<text x="116" y="395" font-size="10.5" font-style="italic" text-anchor="middle">«actor»</text>
<text x="116" y="412" font-size="13"   font-weight="bold"  text-anchor="middle">StudentActor</text>
<text x="26"  y="439" font-size="11">+ userID : String</text>
<text x="26"  y="456" font-size="11">+ name : String</text>
<text x="26"  y="481" font-size="11">+ viewMyAttendance() : List</text>
<text x="26"  y="498" font-size="11">+ viewMyGrade() : Float</text>
<text x="26"  y="515" font-size="11">+ viewMyEnrollments() : List</text>

<!-- ════ 3. CLASSMANAGER «control»  x=244 y=185 w=250 h=262 ════
     div1=227, div2=303
     attrs: 244,261,278,295  methods: 320,337,354,371,388,405,422,439 -->
<rect x="244" y="185" width="250" height="262" fill="#fff" stroke="#333" stroke-width="1.5"/>
<line x1="244" y1="227" x2="494" y2="227" stroke="#333" stroke-width="1.5"/>
<line x1="244" y1="303" x2="494" y2="303" stroke="#333" stroke-width="1.5"/>
<text x="369" y="200" font-size="10.5" font-style="italic" text-anchor="middle">«control»</text>
<text x="369" y="217" font-size="13"   font-weight="bold"  text-anchor="middle">ClassManager</text>
<text x="250" y="244" font-size="11">+ currentUser : User</text>
<text x="250" y="261" font-size="11">+ selectedClass : Class</text>
<text x="250" y="278" font-size="11">+ attendanceList : List</text>
<text x="250" y="295" font-size="11">+ enrollmentList : List</text>
<text x="250" y="320" font-size="11">+ listMyClasses() : List</text>
<text x="250" y="337" font-size="11">+ selectClass() : Class</text>
<text x="250" y="354" font-size="11">+ listStudents() : List</text>
<text x="250" y="371" font-size="11">+ markAttendance() : void</text>
<text x="250" y="388" font-size="11">+ getAttendanceReport() : List</text>
<text x="250" y="405" font-size="11">+ enterGrade() : void</text>
<text x="250" y="422" font-size="11">+ getClassGrades() : List</text>
<text x="250" y="439" font-size="11">+ getMyEnrollments() : List</text>

<!-- ════ 4. LESSONREPORT «entity»  x=526 y=30 w=200 h=194 ════
     div1=72, div2=199
     attrs: 89,106,123,140,157,174,191  methods: 216 -->
<rect x="526" y="30"  width="200" height="194" fill="#fff" stroke="#333" stroke-width="1.5"/>
<line x1="526" y1="72"  x2="726" y2="72"  stroke="#333" stroke-width="1.5"/>
<line x1="526" y1="199" x2="726" y2="199" stroke="#333" stroke-width="1.5"/>
<text x="626" y="45"  font-size="10.5" font-style="italic" text-anchor="middle">«entity»</text>
<text x="626" y="62"  font-size="13"   font-weight="bold"  text-anchor="middle">LessonReport</text>
<text x="532" y="89"  font-size="11">+ classID : String</text>
<text x="532" y="106" font-size="11">+ courseID : String</text>
<text x="532" y="123" font-size="11">+ day : DateTime</text>
<text x="532" y="140" font-size="11">+ teacherID : String</text>
<text x="532" y="157" font-size="11">+ studentID : String</text>
<text x="532" y="174" font-size="11">+ isPresent : Boolean</text>
<text x="532" y="191" font-size="11">+ notes : String</text>
<text x="532" y="216" font-size="11">+ validate() : Boolean</text>

<!-- ════ 5. ENROLLMENT «entity»  x=526 y=440 w=200 h=211 ════
     div1=482, div2=609
     attrs: 499,516,533,550,567,584,601  methods: 626,643 -->
<rect x="526" y="440" width="200" height="211" fill="#fff" stroke="#333" stroke-width="1.5"/>
<line x1="526" y1="482" x2="726" y2="482" stroke="#333" stroke-width="1.5"/>
<line x1="526" y1="609" x2="726" y2="609" stroke="#333" stroke-width="1.5"/>
<text x="626" y="455" font-size="10.5" font-style="italic" text-anchor="middle">«entity»</text>
<text x="626" y="472" font-size="13"   font-weight="bold"  text-anchor="middle">Enrollment</text>
<text x="532" y="499" font-size="11">+ classID : String</text>
<text x="532" y="516" font-size="11">+ courseID : String</text>
<text x="532" y="533" font-size="11">+ studentID : String</text>
<text x="532" y="550" font-size="11">+ midtermScore : Float</text>
<text x="532" y="567" font-size="11">+ finalTermScore : Float</text>
<text x="532" y="584" font-size="11">+ grade : String</text>
<text x="532" y="601" font-size="11">+ status : String</text>
<text x="532" y="626" font-size="11">+ computeFinalGrade() : Float</text>
<text x="532" y="643" font-size="11">+ isActive() : Boolean</text>

<!-- ════ 6. CLASS «entity»  x=758 y=230 w=190 h=194 ════
     div1=272, div2=382
     attrs: 289,306,323,340,357,374  methods: 399,416 -->
<rect x="758" y="230" width="190" height="194" fill="#fff" stroke="#333" stroke-width="1.5"/>
<line x1="758" y1="272" x2="948" y2="272" stroke="#333" stroke-width="1.5"/>
<line x1="758" y1="382" x2="948" y2="382" stroke="#333" stroke-width="1.5"/>
<text x="853" y="245" font-size="10.5" font-style="italic" text-anchor="middle">«entity»</text>
<text x="853" y="262" font-size="13"   font-weight="bold"  text-anchor="middle">Class</text>
<text x="764" y="289" font-size="11">+ classID : String</text>
<text x="764" y="306" font-size="11">+ courseID : String</text>
<text x="764" y="323" font-size="11">+ semester : String</text>
<text x="764" y="340" font-size="11">+ capacity : Integer</text>
<text x="764" y="357" font-size="11">+ room : String</text>
<text x="764" y="374" font-size="11">+ dayOfWeek : String</text>
<text x="764" y="399" font-size="11">+ getEnrollments() : List</text>
<text x="764" y="416" font-size="11">+ checkCapacity() : Boolean</text>


<!-- ════════════ ARROWS ════════════
  ChanA x=228  ChanB x=510  ChanC x=742  Top y=8
-->

<!-- Arrow 1: Teacher ——> ClassManager  "Performs"  1 → 1..*
     Teacher center-y = 30+97 = 127
     CM top-mid y = 185+34 = 219 (attributes top)
     (212,127) → (228,127→219) → (244,219) -->
<path d="M 212,127 H 228 V 219 H 244"
      fill="none" stroke="#333" stroke-width="1.4"
      stroke-linejoin="round" marker-end="url(#mf)"/>
<text x="215" y="123" font-size="10">1</text>
<text x="230" y="236" font-size="10">1..*</text>
<rect x="215" y="166" width="56" height="14" fill="#fff"/>
<text x="216" y="177" font-size="11" font-style="italic">Performs</text>

<!-- Arrow 2: StudentActor ——> ClassManager  "Performs"  1 → 1..*
     SA center-y = 380+71 = 451
     CM bottom y = 447, let's enter at y=430
     (212,451) → (228,451→430) → (244,430) -->
<path d="M 212,451 H 228 V 430 H 244"
      fill="none" stroke="#333" stroke-width="1.4"
      stroke-linejoin="round" marker-end="url(#mf)"/>
<text x="215" y="447" font-size="10">1</text>
<text x="230" y="427" font-size="10">1..*</text>
<rect x="215" y="434" width="56" height="14" fill="#fff"/>
<text x="216" y="445" font-size="11" font-style="italic">Performs</text>

<!-- Arrow 3: ClassManager ——> LessonReport  "Creates / manages"  1 → 0..*
     CM right at y=230, Report left at y=150
     (494,230) → (510,230→150) → (526,150) -->
<path d="M 494,230 H 510 V 150 H 526"
      fill="none" stroke="#333" stroke-width="1.4"
      stroke-linejoin="round" marker-end="url(#mf)"/>
<text x="497" y="226" font-size="10">1</text>
<text x="512" y="147" font-size="10">0..*</text>
<rect x="497" y="183" width="98" height="14" fill="#fff"/>
<text x="498" y="194" font-size="11" font-style="italic">Creates / manages</text>

<!-- Arrow 4: ClassManager ——> Enrollment  "Grades / views"  1 → 0..*
     CM right at y=410, Enrollment left at y=550
     (494,410) → (510,410→550) → (526,550) -->
<path d="M 494,410 H 510 V 550 H 526"
      fill="none" stroke="#333" stroke-width="1.4"
      stroke-linejoin="round" marker-end="url(#mf)"/>
<text x="497" y="406" font-size="10">1</text>
<text x="512" y="547" font-size="10">0..*</text>
<rect x="497" y="473" width="82" height="14" fill="#fff"/>
<text x="498" y="484" font-size="11" font-style="italic">Grades / views</text>

<!-- Arrow 5: LessonReport ——> Class  "Belongs to"  0..* → 1
     Report right (726, 120) → ChanC (742,120→250) → Class left (758,250) -->
<path d="M 726,120 H 742 V 250 H 758"
      fill="none" stroke="#333" stroke-width="1.4"
      stroke-linejoin="round" marker-end="url(#mf)"/>
<text x="729" y="116" font-size="10">0..*</text>
<text x="744" y="247" font-size="10">1</text>
<rect x="731" y="178" width="55" height="14" fill="#fff"/>
<text x="732" y="189" font-size="11" font-style="italic">Belongs to</text>

<!-- Arrow 6: Enrollment ——> Class  "Belongs to"  0..* → 1
     Enrollment right (726, 540) → ChanC (742,540→400) → Class left (758,400) -->
<path d="M 726,540 H 742 V 400 H 758"
      fill="none" stroke="#333" stroke-width="1.4"
      stroke-linejoin="round" marker-end="url(#mf)"/>
<text x="729" y="536" font-size="10">0..*</text>
<text x="744" y="397" font-size="10">1</text>
<rect x="731" y="463" width="55" height="14" fill="#fff"/>
<text x="732" y="474" font-size="11" font-style="italic">Belongs to</text>

<!-- Arrow 7: ClassManager «uses» Class  (dashed, top channel y=8)
     (369,185) → (369,8) → (853,8) → (853,230) -->
<path d="M 369,185 V 8 H 853 V 230"
      fill="none" stroke="#333" stroke-width="1.3"
      stroke-dasharray="6,3" stroke-linejoin="round" marker-end="url(#md)"/>
<rect x="589" y="0" width="44" height="13" fill="#fff"/>
<text x="590" y="11" font-size="11" font-style="italic">«uses»</text>

</svg>

<!-- Legend -->
<div class="legend">
  <span><b>Access modifiers:</b> &nbsp; <b>+</b> public &nbsp;|&nbsp; <b>−</b> private</span>
  <span>——&gt; Directed Association (open V)</span>
  <span>– – –&gt; Dependency / «uses» (open V, dashed)</span>
  <span><b>1 &nbsp; 0..* &nbsp; 1..*</b> — Multiplicity</span>
  <span><b>«actor»</b> / <b>«control»</b> / <b>«entity»</b> — UML stereotypes</span>
</div>

</body>
</html>
