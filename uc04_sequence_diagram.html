<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>UC04 – Sequence Diagram: Class Management</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Times New Roman', Times, serif; background: #f0ede8; padding: 24px 16px; }
  h1 { text-align: center; font-size: 17px; font-weight: bold; margin-bottom: 4px; color: #111; }
  .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 18px; }
  svg { display: block; margin: 0 auto; background: #fff;
        border: 1.5px solid #999; box-shadow: 3px 3px 10px rgba(0,0,0,.15); }
  .legend { width: 790px; margin: 12px auto 0; display: flex; gap: 18px; flex-wrap: wrap;
            font-size: 11px; color: #444; border-top: 1px solid #bbb; padding-top: 8px; }
</style>
</head>
<body>

<h1>Sequence Diagram — UC04: Class Management</h1>
<p class="sub">Scenario: Mark Attendance (bulk) · Enter / View Grade</p>

<!--
  Participant lifeline centers:
    Teacher=90  ClassManager=275  LessonReportDB=473  EnrollmentDB=683
  Row spacing: 40px  |  Canvas: 790 × 840
-->
<svg width="790" height="840" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <marker id="mf" markerWidth="9" markerHeight="8" refX="8.5" refY="4" orient="auto">
    <polygon points="0,0 9,4 0,8" fill="#333"/>
  </marker>
  <marker id="mr" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
    <polyline points="0,0 9,4.5 0,9" fill="none" stroke="#666" stroke-width="1.3"/>
  </marker>
</defs>

<!-- PARTICIPANT BOXES (top) -->
<rect x="25"  y="22" width="130" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="90"  y="44" font-size="12" font-weight="bold" text-anchor="middle">Teacher</text>

<rect x="210" y="22" width="130" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="275" y="38" font-size="11" font-weight="bold" text-anchor="middle">Class</text>
<text x="275" y="52" font-size="11" font-weight="bold" text-anchor="middle">Manager</text>

<rect x="395" y="22" width="155" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="473" y="44" font-size="12" font-weight="bold" text-anchor="middle">LessonReportDB</text>

<rect x="608" y="22" width="155" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="686" y="44" font-size="12" font-weight="bold" text-anchor="middle">EnrollmentDB</text>

<!-- LIFELINES -->
<line x1="90"  y1="58" x2="90"  y2="778" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="275" y1="58" x2="275" y2="778" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="473" y1="58" x2="473" y2="778" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="686" y1="58" x2="686" y2="778" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>

<!-- ACTIVATION BARS -->
<!-- Teacher & Manager active throughout -->
<rect x="85"  y="108" width="10" height="630" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<rect x="270" y="108" width="10" height="630" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- Section 1: EnrollmentDB for listEnrollments (y=170..210) -->
<rect x="681" y="170" width="10" height="40"  fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- Section 1 loop: LessonReportDB for checkExisting (y=358..398) and save(y=458..498) -->
<rect x="468" y="358" width="10" height="40"  fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<rect x="468" y="458" width="10" height="40"  fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- Section 2: EnrollmentDB for findEnrollment(y=596..636) and updateGrade(y=674..714) -->
<rect x="681" y="596" width="10" height="40"  fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<rect x="681" y="674" width="10" height="40"  fill="#d6eaff" stroke="#88a" stroke-width="1"/>

<!-- ── SECTION 1: Attendance ── -->
<text x="58" y="100" font-size="10.5" fill="#777" font-style="italic">1. Mark Attendance</text>

<!-- 1→ Teacher → Manager: getClassStudents -->
<text x="182" y="121" text-anchor="middle" font-size="11">getClassStudents(classID)</text>
<line x1="95" y1="130" x2="267" y2="130" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 2→ Manager → EnrollmentDB: listEnrollments -->
<text x="480" y="161" text-anchor="middle" font-size="11">listEnrollments(classID)</text>
<line x1="280" y1="170" x2="678" y2="170" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 3← EnrollmentDB → Manager [return] -->
<text x="480" y="201" text-anchor="middle" font-size="10.5" fill="#555">List of enrolled students</text>
<line x1="681" y1="210" x2="283" y2="210" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 4← Manager → Teacher: 200 OK -->
<text x="182" y="241" text-anchor="middle" font-size="10.5" fill="#555">200 OK — student list</text>
<line x1="270" y1="250" x2="98" y2="250" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 5→ Teacher → Manager: bulkMarkAttendance -->
<text x="182" y="281" text-anchor="middle" font-size="11">bulkMarkAttendance( records[ ] )</text>
<line x1="95" y1="290" x2="267" y2="290" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- LOOP fragment -->
<rect x="58" y="308" width="590" height="182" fill="rgba(210,255,210,0.18)" stroke="#444" stroke-width="1.3"/>
<polygon points="58,308 104,308 104,326 98,333 58,333" fill="#bef5be" stroke="#444" stroke-width="1"/>
<text x="64" y="323" font-size="11" font-weight="bold">loop</text>
<text x="110" y="323" font-size="10.5">[for each student record]</text>

<!-- 6→ Manager → LessonReportDB: checkExisting -->
<text x="374" y="349" text-anchor="middle" font-size="11">checkExisting(classID, day, studentID)</text>
<line x1="280" y1="358" x2="465" y2="358" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 7← LessonReportDB → Manager: result -->
<text x="374" y="389" text-anchor="middle" font-size="10.5" fill="#555">existing record / null</text>
<line x1="468" y1="398" x2="283" y2="398" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- inner ALT inside loop -->
<rect x="70" y="412" width="567" height="68" fill="rgba(220,236,255,0.12)" stroke="#777" stroke-width="1" stroke-dasharray="3,2"/>
<polygon points="70,412 107,412 107,428 101,435 70,435" fill="#d8eeff" stroke="#777" stroke-width="1"/>
<text x="75" y="427" font-size="10" font-weight="bold">alt</text>
<text x="113" y="427" font-size="10">[existing record] → update absent status</text>
<!-- separator -->
<line x1="70" y1="448" x2="637" y2="448" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
<text x="76" y="462" font-size="10">[new record] → save(LessonReport)</text>

<!-- 8→ Manager → LessonReportDB: save -->
<text x="374" y="449" text-anchor="middle" font-size="11">save(LessonReport)</text>
<line x1="280" y1="458" x2="465" y2="458" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 9← LessonReportDB → Manager: return -->
<text x="374" y="489" text-anchor="middle" font-size="10.5" fill="#555">LessonReport — saved</text>
<line x1="468" y1="498" x2="283" y2="498" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 10← Manager → Teacher: 201 Created -->
<text x="182" y="521" text-anchor="middle" font-size="10.5" fill="#555">201 Created — attendance recorded</text>
<line x1="270" y1="530" x2="98" y2="530" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ── SECTION 2: Enter Grade ── -->
<line x1="58" y1="548" x2="750" y2="548" stroke="#ddd" stroke-width="1"/>
<text x="58" y="562" font-size="10.5" fill="#777" font-style="italic">2. Enter Grade</text>

<!-- 11→ Teacher → Manager: enterGrade -->
<text x="182" y="585" text-anchor="middle" font-size="11">enterGrade(classID, studentID, midterm, final)</text>
<line x1="95" y1="594" x2="267" y2="594" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 12→ Manager → EnrollmentDB: findEnrollment -->
<text x="481" y="587" text-anchor="middle" font-size="11">findEnrollment(classID, studentID)</text>
<line x1="280" y1="596" x2="678" y2="596" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 13← EnrollmentDB → Manager: Enrollment record -->
<text x="481" y="627" text-anchor="middle" font-size="10.5" fill="#555">Enrollment record</text>
<line x1="681" y1="636" x2="283" y2="636" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 14→ Manager → EnrollmentDB: updateGrade -->
<text x="481" y="665" text-anchor="middle" font-size="11">updateGrade(midterm, final, computeGrade())</text>
<line x1="280" y1="674" x2="678" y2="674" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 15← EnrollmentDB → Manager: Updated record -->
<text x="481" y="705" text-anchor="middle" font-size="10.5" fill="#555">Updated Enrollment record</text>
<line x1="681" y1="714" x2="283" y2="714" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 16← Manager → Teacher: 200 OK -->
<text x="182" y="737" text-anchor="middle" font-size="10.5" fill="#555">200 OK</text>
<line x1="270" y1="746" x2="98" y2="746" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- BOTTOM PARTICIPANT BOXES -->
<rect x="25"  y="778" width="130" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="90"  y="806" font-size="12" font-weight="bold" text-anchor="middle">Teacher</text>
<rect x="210" y="778" width="130" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="275" y="798" font-size="11" font-weight="bold" text-anchor="middle">Class</text>
<text x="275" y="814" font-size="11" font-weight="bold" text-anchor="middle">Manager</text>
<rect x="395" y="778" width="155" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="473" y="806" font-size="12" font-weight="bold" text-anchor="middle">LessonReportDB</text>
<rect x="608" y="778" width="155" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="686" y="806" font-size="12" font-weight="bold" text-anchor="middle">EnrollmentDB</text>
</svg>

<div class="legend">
  <span>——▶ Synchronous call (filled)</span>
  <span>– – –&gt; Return message (dashed, open V)</span>
  <span>┌loop┐ Loop combined fragment</span>
  <span>┌alt┐ Alternative combined fragment</span>
  <span>░░ Activation bar</span>
</div>
</body>
</html>
