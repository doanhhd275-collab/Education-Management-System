<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>UC01 – Sequence Diagram: Account Management</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Times New Roman', Times, serif; background: #f0ede8; padding: 24px 16px; }
  h1 { text-align: center; font-size: 17px; font-weight: bold; margin-bottom: 4px; color: #111; }
  .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 18px; }
  svg { display: block; margin: 0 auto; background: #fff;
        border: 1.5px solid #999; box-shadow: 3px 3px 10px rgba(0,0,0,.15); }
  .legend { width: 760px; margin: 12px auto 0; display: flex; gap: 18px; flex-wrap: wrap;
            font-size: 11px; color: #444; border-top: 1px solid #bbb; padding-top: 8px; }
</style>
</head>
<body>

<h1>Sequence Diagram — UC01: Account Management</h1>
<p class="sub">Scenario: User Login · Create Account · Assign Role</p>

<!--
  Participant lifeline centers:
    Admin=90  AccountManager=290  AuthService=480  Database=670
  Row spacing: 40px  |  Canvas: 760 × 640
-->
<svg width="760" height="640" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <marker id="mf" markerWidth="9" markerHeight="8" refX="8.5" refY="4" orient="auto">
    <polygon points="0,0 9,4 0,8" fill="#333"/>
  </marker>
  <marker id="mr" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
    <polyline points="0,0 9,4.5 0,9" fill="none" stroke="#666" stroke-width="1.3"/>
  </marker>
</defs>

<!-- PARTICIPANT BOXES (top) -->
<rect x="25"  y="22" width="130" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="90"  y="44" font-size="12" font-weight="bold" text-anchor="middle">Admin</text>

<rect x="220" y="22" width="140" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="290" y="38" font-size="11" font-weight="bold" text-anchor="middle">Account</text>
<text x="290" y="52" font-size="11" font-weight="bold" text-anchor="middle">Manager</text>

<rect x="415" y="22" width="130" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="480" y="44" font-size="12" font-weight="bold" text-anchor="middle">AuthService</text>

<rect x="605" y="22" width="130" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="670" y="44" font-size="12" font-weight="bold" text-anchor="middle">Database</text>

<!-- LIFELINES -->
<line x1="90"  y1="58" x2="90"  y2="588" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="290" y1="58" x2="290" y2="588" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="480" y1="58" x2="480" y2="588" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="670" y1="58" x2="670" y2="588" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>

<!-- ACTIVATION BARS -->
<!-- Admin & Manager active throughout -->
<rect x="85"  y="108" width="10" height="430" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<rect x="285" y="108" width="10" height="430" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- Database: active when processing findByEmail (y=170..210) -->
<rect x="665" y="170" width="10" height="40"  fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- AuthService: active for verifyPassword and createToken (y=290..418) -->
<rect x="475" y="290" width="10" height="128" fill="#d6eaff" stroke="#88a" stroke-width="1"/>

<!-- 1. Admin → AccountManager: login -->
<text x="190" y="121" text-anchor="middle" font-size="11">login(email, password)</text>
<line x1="95" y1="130" x2="282" y2="130" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 2. AccountManager → Database: findByEmail -->
<text x="480" y="161" text-anchor="middle" font-size="11">findByEmail(email)</text>
<line x1="295" y1="170" x2="662" y2="170" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 3. Database → AccountManager: User [return] -->
<text x="480" y="201" text-anchor="middle" font-size="10.5" fill="#555">User</text>
<line x1="665" y1="210" x2="298" y2="210" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ALT fragment -->
<rect x="58" y="228" width="670" height="310" fill="rgba(220,236,255,0.12)" stroke="#444" stroke-width="1.3"/>
<polygon points="58,228 102,228 102,246 96,253 58,253" fill="#c8e0ff" stroke="#444" stroke-width="1"/>
<text x="64" y="243" font-size="11" font-weight="bold">alt</text>
<text x="108" y="243" font-size="10.5">[valid credentials]</text>

<!-- 4. AccountManager → AuthService: verifyPassword -->
<text x="385" y="277" text-anchor="middle" font-size="11">verifyPassword(password, hash)</text>
<line x1="295" y1="290" x2="472" y2="290" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 5. AuthService → AccountManager: true [return] -->
<text x="385" y="321" text-anchor="middle" font-size="10.5" fill="#555">true</text>
<line x1="475" y1="330" x2="298" y2="330" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 6. AccountManager → AuthService: createAccessToken -->
<text x="385" y="361" text-anchor="middle" font-size="11">createAccessToken(userID, roles)</text>
<line x1="295" y1="370" x2="472" y2="370" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 7. AuthService → AccountManager: jwtToken [return] -->
<text x="385" y="401" text-anchor="middle" font-size="10.5" fill="#555">jwtToken</text>
<line x1="475" y1="410" x2="298" y2="410" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 8. AccountManager → Admin: 200 TokenResponse [return] -->
<text x="190" y="441" text-anchor="middle" font-size="10.5" fill="#555">200 TokenResponse { token }</text>
<line x1="285" y1="450" x2="98" y2="450" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ALT separator -->
<line x1="58" y1="468" x2="728" y2="468" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
<text x="64" y="483" font-size="10.5">[invalid credentials]</text>

<!-- 9. AccountManager → Admin: 401 Unauthorized [return] -->
<text x="190" y="505" text-anchor="middle" font-size="10.5" fill="#555">401 Unauthorized</text>
<line x1="285" y1="514" x2="98" y2="514" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- BOTTOM PARTICIPANT BOXES -->
<rect x="25"  y="588" width="130" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="90"  y="616" font-size="12" font-weight="bold" text-anchor="middle">Admin</text>
<rect x="220" y="588" width="140" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="290" y="608" font-size="11" font-weight="bold" text-anchor="middle">Account</text>
<text x="290" y="624" font-size="11" font-weight="bold" text-anchor="middle">Manager</text>
<rect x="415" y="588" width="130" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="480" y="616" font-size="12" font-weight="bold" text-anchor="middle">AuthService</text>
<rect x="605" y="588" width="130" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="670" y="616" font-size="12" font-weight="bold" text-anchor="middle">Database</text>
</svg>

<div class="legend">
  <span>——▶ Synchronous call (filled arrowhead)</span>
  <span>– – –&gt; Return message (open arrowhead, dashed)</span>
  <span>┌alt┐ Combined fragment — alternative paths</span>
  <span>░░ Activation bar</span>
</div>
</body>
</html>
