<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>UC01 – State Machine: Account Management</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Times New Roman', Times, serif; background: #f0ede8; padding: 24px 16px; }
  h1 { text-align: center; font-size: 17px; font-weight: bold; margin-bottom: 4px; color: #111; }
  .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 18px; }
  svg { display: block; margin: 0 auto; background: #fff;
        border: 1.5px solid #999; box-shadow: 3px 3px 10px rgba(0,0,0,.15); }
  .legend { width: 660px; margin: 12px auto 0; display: flex; gap: 18px; flex-wrap: wrap;
            font-size: 11px; color: #444; border-top: 1px solid #bbb; padding-top: 8px; }
</style>
</head>
<body>

<h1>State Machine Diagram — UC01: Account Management</h1>
<p class="sub">Object: User Account &nbsp;|&nbsp; Actor: Admin</p>

<svg width="680" height="540" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <marker id="ma" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
    <polyline points="0,0 9,4.5 0,9" fill="none" stroke="#333" stroke-width="1.4"/>
  </marker>
</defs>

<!-- ═══ INITIAL ● ═══ -->
<circle cx="340" cy="30" r="9" fill="#222"/>

<!-- ═══ STATE: Created ═══ -->
<rect x="258" y="68" width="164" height="60" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<line x1="258" y1="91" x2="422" y2="91" stroke="#333" stroke-width="0.9"/>
<text x="340" y="85" text-anchor="middle" font-size="13" font-weight="bold">Created</text>
<text x="264" y="105" font-size="10" fill="#555">entry / validate data</text>
<text x="264" y="118" font-size="10" fill="#555">do / await role assignment</text>

<!-- ═══ STATE: Active ═══ -->
<rect x="52" y="238" width="180" height="60" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<line x1="52" y1="261" x2="232" y2="261" stroke="#333" stroke-width="0.9"/>
<text x="142" y="255" text-anchor="middle" font-size="13" font-weight="bold">Active</text>
<text x="58" y="276" font-size="10" fill="#555">entry / grant access</text>
<text x="58" y="289" font-size="10" fill="#555">do / maintain session</text>

<!-- ═══ STATE: Suspended ═══ -->
<rect x="448" y="238" width="180" height="60" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<line x1="448" y1="261" x2="628" y2="261" stroke="#333" stroke-width="0.9"/>
<text x="538" y="255" text-anchor="middle" font-size="13" font-weight="bold">Suspended</text>
<text x="454" y="276" font-size="10" fill="#555">entry / revoke access</text>
<text x="454" y="289" font-size="10" fill="#555">do / log suspension</text>

<!-- ═══ FINAL ◉ ═══ -->
<circle cx="340" cy="492" r="14" fill="none" stroke="#222" stroke-width="2.5"/>
<circle cx="340" cy="492" r="8"  fill="#222"/>

<!-- ══════════════ TRANSITIONS ══════════════ -->

<!-- T1: ● → Created -->
<line x1="340" y1="39" x2="340" y2="68" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="348" y="40" width="80" height="16" fill="white" stroke="none"/>
<text x="350" y="53" font-size="10.5" font-style="italic">createUser()</text>

<!-- T2: Created → Active (diagonal) -->
<line x1="278" y1="128" x2="188" y2="238" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="118" y="160" width="80" height="16" fill="white" stroke="none"/>
<text x="120" y="173" font-size="10.5" font-style="italic">assignRole()</text>

<!-- T3: Active → Suspended (arc above) -->
<path d="M 232,254 C 306,210 414,210 448,254"
      fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="300" y="197" width="80" height="16" fill="white" stroke="none"/>
<text x="340" y="210" text-anchor="middle" font-size="10.5" font-style="italic">suspend()</text>

<!-- T4: Suspended → Active (arc below) -->
<path d="M 448,272 C 414,316 306,316 232,272"
      fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="296" y="316" width="88" height="16" fill="white" stroke="none"/>
<text x="340" y="329" text-anchor="middle" font-size="10.5" font-style="italic">reactivate()</text>

<!-- T5: Active → Final -->
<line x1="152" y1="298" x2="326" y2="478" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="96" y="368" width="80" height="16" fill="white" stroke="none"/>
<text x="98" y="381" font-size="10.5" font-style="italic">deleteUser()</text>

<!-- T6: Suspended → Final -->
<line x1="528" y1="298" x2="354" y2="478" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="453" y="368" width="80" height="16" fill="white" stroke="none"/>
<text x="455" y="381" font-size="10.5" font-style="italic">deleteUser()</text>

</svg>

<div class="legend">
  <span>● Initial pseudostate</span>
  <span>◉ Final pseudostate (deleted)</span>
  <span>——&gt; Transition with event label</span>
  <span>⌒ Bidirectional curved transitions</span>
</div>
</body>
</html>
