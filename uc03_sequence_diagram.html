<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>UC03 – Sequence Diagram: Student Management</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Times New Roman', Times, serif; background: #f0ede8; padding: 24px 16px; }
  h1 { text-align: center; font-size: 17px; font-weight: bold; margin-bottom: 4px; color: #111; }
  .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 18px; }
  svg { display: block; margin: 0 auto; background: #fff;
        border: 1.5px solid #999; box-shadow: 3px 3px 10px rgba(0,0,0,.15); }
  .legend { width: 780px; margin: 12px auto 0; display: flex; gap: 18px; flex-wrap: wrap;
            font-size: 11px; color: #444; border-top: 1px solid #bbb; padding-top: 8px; }
</style>
</head>
<body>

<h1>Sequence Diagram — UC03: Student Management</h1>
<p class="sub">Scenario: View GPA/CPA · Register Class · View Academic Warning</p>

<!--
  Participant lifeline centers:
    Student=90  StudentManager=285  EnrollmentDB=483  StudentDB=683
  Row spacing: 40px  |  Canvas: 780 × 860
-->
<svg width="780" height="860" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <marker id="mf" markerWidth="9" markerHeight="8" refX="8.5" refY="4" orient="auto">
    <polygon points="0,0 9,4 0,8" fill="#333"/>
  </marker>
  <marker id="mr" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
    <polyline points="0,0 9,4.5 0,9" fill="none" stroke="#666" stroke-width="1.3"/>
  </marker>
</defs>

<!-- PARTICIPANT BOXES (top) -->
<rect x="25"  y="22" width="130" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="90"  y="44" font-size="12" font-weight="bold" text-anchor="middle">Student</text>

<rect x="215" y="22" width="140" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="285" y="38" font-size="11" font-weight="bold" text-anchor="middle">Student</text>
<text x="285" y="52" font-size="11" font-weight="bold" text-anchor="middle">Manager</text>

<rect x="413" y="22" width="140" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="483" y="44" font-size="12" font-weight="bold" text-anchor="middle">EnrollmentDB</text>

<rect x="613" y="22" width="140" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="683" y="44" font-size="12" font-weight="bold" text-anchor="middle">StudentDB</text>

<!-- LIFELINES -->
<line x1="90"  y1="58" x2="90"  y2="800" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="285" y1="58" x2="285" y2="800" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="483" y1="58" x2="483" y2="800" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="683" y1="58" x2="683" y2="800" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>

<!-- ACTIVATION BARS -->
<!-- Student & Manager active throughout -->
<rect x="85"  y="108" width="10" height="612" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<rect x="280" y="108" width="10" height="612" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- Section 1: StudentDB active for getStudentRecord (y=170..210) -->
<rect x="678" y="170" width="10" height="40" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- Section 2: EnrollmentDB active for getOpenClasses (y=358..398) -->
<rect x="478" y="358" width="10" height="40" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- Section 2 alt: EnrollmentDB active for checkEnrolled (y=544..584) -->
<rect x="478" y="544" width="10" height="40" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- Section 2 alt: EnrollmentDB active for createEnrollment (y=624..664) -->
<rect x="478" y="624" width="10" height="40" fill="#d6eaff" stroke="#88a" stroke-width="1"/>

<!-- ── SECTION 1: View GPA ── -->
<text x="58" y="100" font-size="10.5" fill="#777" font-style="italic">1. View GPA / CPA</text>

<!-- 1→ Student → Manager: viewMyGPA -->
<text x="187" y="121" text-anchor="middle" font-size="11">viewMyGPA(studentID)</text>
<line x1="95" y1="130" x2="277" y2="130" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 2→ Manager → StudentDB: getStudentRecord -->
<text x="484" y="161" text-anchor="middle" font-size="11">getStudentRecord(studentID)</text>
<line x1="290" y1="170" x2="675" y2="170" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 3← StudentDB → Manager: Student record [return] -->
<text x="484" y="201" text-anchor="middle" font-size="10.5" fill="#555">Student { cpa, gpa, warningLevel }</text>
<line x1="678" y1="210" x2="293" y2="210" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 4← Manager → Student: 200 OK -->
<text x="187" y="241" text-anchor="middle" font-size="10.5" fill="#555">200 OK { cpa, gpa, warningLevel }</text>
<line x1="280" y1="250" x2="98" y2="250" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ── SECTION 2: Register Class ── -->
<line x1="58" y1="272" x2="730" y2="272" stroke="#ddd" stroke-width="1"/>
<text x="58" y="286" font-size="10.5" fill="#777" font-style="italic">2. Register for Class</text>

<!-- 5→ Student → Manager: listAvailableClasses -->
<text x="187" y="309" text-anchor="middle" font-size="11">listAvailableClasses()</text>
<line x1="95" y1="318" x2="277" y2="318" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 6→ Manager → EnrollmentDB: getOpenClasses -->
<text x="384" y="349" text-anchor="middle" font-size="11">getOpenClasses()</text>
<line x1="290" y1="358" x2="475" y2="358" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 7← EnrollmentDB → Manager: list [return] -->
<text x="384" y="389" text-anchor="middle" font-size="10.5" fill="#555">List of available classes</text>
<line x1="478" y1="398" x2="293" y2="398" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 8← Manager → Student: 200 OK -->
<text x="187" y="429" text-anchor="middle" font-size="10.5" fill="#555">200 OK — class list</text>
<line x1="280" y1="438" x2="98" y2="438" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 9→ Student → Manager: registerClass -->
<text x="187" y="465" text-anchor="middle" font-size="11">registerClass(classID)</text>
<line x1="95" y1="474" x2="277" y2="474" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- ALT fragment -->
<rect x="58" y="492" width="700" height="280" fill="rgba(220,236,255,0.12)" stroke="#444" stroke-width="1.3"/>
<polygon points="58,492 102,492 102,510 96,517 58,517" fill="#c8e0ff" stroke="#444" stroke-width="1"/>
<text x="64" y="507" font-size="11" font-weight="bold">alt</text>
<text x="108" y="507" font-size="10.5">[not yet enrolled]</text>

<!-- 10→ Manager → EnrollmentDB: checkEnrolled -->
<text x="384" y="535" text-anchor="middle" font-size="11">checkEnrolled(studentID, classID)</text>
<line x1="290" y1="544" x2="475" y2="544" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 11← EnrollmentDB → Manager: null -->
<text x="384" y="575" text-anchor="middle" font-size="10.5" fill="#555">null — not enrolled</text>
<line x1="478" y1="584" x2="293" y2="584" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 12→ Manager → EnrollmentDB: createEnrollment -->
<text x="384" y="615" text-anchor="middle" font-size="11">createEnrollment(studentID, classID)</text>
<line x1="290" y1="624" x2="475" y2="624" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 13← EnrollmentDB → Manager: Enrollment -->
<text x="384" y="655" text-anchor="middle" font-size="10.5" fill="#555">Enrollment — 201 Created</text>
<line x1="478" y1="664" x2="293" y2="664" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 14← Manager → Student: 201 Created -->
<text x="187" y="693" text-anchor="middle" font-size="10.5" fill="#555">201 Created — registered</text>
<line x1="280" y1="698" x2="98" y2="698" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ALT separator -->
<line x1="58" y1="718" x2="758" y2="718" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
<text x="64" y="733" font-size="10.5">[already enrolled]</text>

<!-- 15← Manager → Student: 400 -->
<text x="187" y="755" text-anchor="middle" font-size="10.5" fill="#555">400 — Already enrolled in this class</text>
<line x1="280" y1="764" x2="98" y2="764" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- BOTTOM PARTICIPANT BOXES -->
<rect x="25"  y="800" width="130" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="90"  y="828" font-size="12" font-weight="bold" text-anchor="middle">Student</text>
<rect x="215" y="800" width="140" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="285" y="820" font-size="11" font-weight="bold" text-anchor="middle">Student</text>
<text x="285" y="836" font-size="11" font-weight="bold" text-anchor="middle">Manager</text>
<rect x="413" y="800" width="140" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="483" y="828" font-size="12" font-weight="bold" text-anchor="middle">EnrollmentDB</text>
<rect x="613" y="800" width="140" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="683" y="828" font-size="12" font-weight="bold" text-anchor="middle">StudentDB</text>
</svg>

<div class="legend">
  <span>——▶ Synchronous call (filled)</span>
  <span>– – –&gt; Return message (dashed, open V)</span>
  <span>┌alt┐ Alternative combined fragment</span>
  <span>░░ Activation bar</span>
</div>
</body>
</html>
