<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>UC03 – State Machine: Student Management</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Times New Roman', Times, serif; background: #f0ede8; padding: 24px 16px; }
  h1 { text-align: center; font-size: 17px; font-weight: bold; margin-bottom: 4px; color: #111; }
  .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 18px; }
  svg { display: block; margin: 0 auto; background: #fff;
        border: 1.5px solid #999; box-shadow: 3px 3px 10px rgba(0,0,0,.15); }
  .legend { width: 720px; margin: 12px auto 0; display: flex; gap: 18px; flex-wrap: wrap;
            font-size: 11px; color: #444; border-top: 1px solid #bbb; padding-top: 8px; }
</style>
</head>
<body>

<h1>State Machine Diagram — UC03: Student Management</h1>
<p class="sub">Object: Student Academic Status</p>

<svg width="740" height="690" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <marker id="ma" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
    <polyline points="0,0 9,4.5 0,9" fill="none" stroke="#333" stroke-width="1.4"/>
  </marker>
</defs>

<!-- ═══ INITIAL ● ═══ -->
<circle cx="370" cy="30" r="9" fill="#222"/>

<!-- ═══ STATE: Good Standing ═══ -->
<rect x="285" y="68" width="170" height="44" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<text x="370" y="95" text-anchor="middle" font-size="13" font-weight="bold">Good Standing</text>

<!-- ═══ STATE: Warning Level 1 ═══ -->
<rect x="285" y="198" width="170" height="44" rx="14" fill="#fff" stroke="#e8a000" stroke-width="1.8"/>
<text x="370" y="220" text-anchor="middle" font-size="12.5" font-weight="bold">Warning Level 1</text>
<text x="370" y="234" text-anchor="middle" font-size="10" fill="#888">[CPA &lt; 1.0]</text>

<!-- ═══ STATE: Warning Level 2 ═══ -->
<rect x="285" y="328" width="170" height="44" rx="14" fill="#fff" stroke="#d04000" stroke-width="1.8"/>
<text x="370" y="350" text-anchor="middle" font-size="12.5" font-weight="bold">Warning Level 2</text>
<text x="370" y="363" text-anchor="middle" font-size="10" fill="#888">[CPA &lt; 0.8]</text>

<!-- ═══ STATE: Graduated (right branch) ═══ -->
<rect x="536" y="198" width="160" height="44" rx="14" fill="#fff" stroke="#2a7a2a" stroke-width="1.8"/>
<text x="616" y="225" text-anchor="middle" font-size="13" font-weight="bold">Graduated</text>

<!-- ═══ STATE: Suspended (left branch) ═══ -->
<rect x="40" y="428" width="160" height="44" rx="14" fill="#fff" stroke="#cc2222" stroke-width="1.8"/>
<text x="120" y="455" text-anchor="middle" font-size="13" font-weight="bold">Suspended</text>

<!-- ═══ STATE: Expelled (left branch) ═══ -->
<rect x="40" y="548" width="160" height="44" rx="14" fill="#fff" stroke="#aa0000" stroke-width="2"/>
<text x="120" y="575" text-anchor="middle" font-size="13" font-weight="bold">Expelled</text>

<!-- ═══ FINAL ◉ ═══ -->
<circle cx="370" cy="650" r="14" fill="none" stroke="#222" stroke-width="2.5"/>
<circle cx="370" cy="650" r="8"  fill="#222"/>

<!-- ══════════ TRANSITIONS ══════════ -->

<!-- T1: ● → Good Standing -->
<line x1="370" y1="39" x2="370" y2="68" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="378" y="42" width="54" height="16" fill="white" stroke="none"/>
<text x="380" y="55" font-size="10.5" font-style="italic">enroll()</text>

<!-- T2: Good Standing → Warning 1 -->
<line x1="368" y1="112" x2="368" y2="198" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="376" y="137" width="100" height="16" fill="white" stroke="none"/>
<text x="378" y="150" font-size="10.5" font-style="italic">endSemester()</text>
<rect x="376" y="155" width="80" height="14" fill="white" stroke="none"/>
<text x="378" y="167" font-size="10" fill="#888">[CPA &lt; 1.0]</text>

<!-- T3: Warning 1 → Good Standing (left curve back up) -->
<path d="M 285,213 C 210,213 210,88 285,83"
      fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="142" y="136" width="100" height="16" fill="white" stroke="none"/>
<text x="144" y="149" font-size="10.5" font-style="italic">endSemester()</text>
<rect x="142" y="154" width="82" height="14" fill="white" stroke="none"/>
<text x="144" y="166" font-size="10" fill="#888">[CPA ≥ 2.0]</text>

<!-- T4: Warning 1 → Warning 2 -->
<line x1="372" y1="242" x2="372" y2="328" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="380" y="270" width="100" height="16" fill="white" stroke="none"/>
<text x="382" y="283" font-size="10.5" font-style="italic">endSemester()</text>
<rect x="380" y="288" width="108" height="14" fill="white" stroke="none"/>
<text x="382" y="300" font-size="10" fill="#888">[CPA still &lt; 1.0]</text>

<!-- T5: Warning 2 → Warning 1 (right curve back up) -->
<path d="M 455,340 C 528,328 528,212 455,205"
      fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="476" y="263" width="100" height="16" fill="white" stroke="none"/>
<text x="478" y="276" font-size="10.5" font-style="italic">endSemester()</text>
<rect x="476" y="281" width="92" height="14" fill="white" stroke="none"/>
<text x="478" y="293" font-size="10" fill="#888">[CPA recovers]</text>

<!-- T6: Good Standing → Graduated -->
<path d="M 455,88 L 536,210" fill="none" stroke="#2a7a2a" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="468" y="122" width="74" height="16" fill="white" stroke="none"/>
<text x="470" y="135" font-size="10.5" font-style="italic" fill="#2a7a2a">graduate()</text>
<rect x="468" y="140" width="92" height="14" fill="white" stroke="none"/>
<text x="470" y="152" font-size="10" fill="#888">[credits done, CPA ≥ 2.0]</text>

<!-- T7: Graduated → Final (far diagonal – label beside line, not on it) -->
<path d="M 616,242 L 384,636" fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="530" y="366" width="72" height="16" fill="white" stroke="none"/>
<text x="532" y="379" font-size="10.5" font-style="italic">complete()</text>

<!-- T8: Warning 2 → Suspended -->
<path d="M 285,350 L 200,428" fill="none" stroke="#cc2222" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="192" y="376" width="68" height="16" fill="white" stroke="none"/>
<text x="194" y="389" font-size="10.5" font-style="italic" fill="#cc2222">suspend()</text>
<rect x="192" y="394" width="106" height="14" fill="white" stroke="none"/>
<text x="194" y="406" font-size="10" fill="#888">[CPA &lt; threshold]</text>

<!-- T9: Suspended → Expelled -->
<line x1="120" y1="472" x2="120" y2="548" stroke="#aa0000" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="128" y="498" width="52" height="16" fill="white" stroke="none"/>
<text x="130" y="511" font-size="10.5" font-style="italic" fill="#aa0000">expel()</text>
<rect x="128" y="516" width="94" height="14" fill="white" stroke="none"/>
<text x="130" y="528" font-size="10" fill="#888">[no improvement]</text>

<!-- T10: Expelled → Final -->
<path d="M 200,570 L 356,636" fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="222" y="606" width="76" height="16" fill="white" stroke="none"/>
<text x="224" y="619" font-size="10.5" font-style="italic">terminate()</text>

</svg>

<div class="legend">
  <span>● Initial pseudostate</span>
  <span>◉ Final pseudostate</span>
  <span>Orange border — Warning state</span>
  <span>Green border — Graduated</span>
  <span>Red border — Penalty state</span>
</div>
</body>
</html>
