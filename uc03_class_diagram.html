<!DOCTYPE html>

<style>

  .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 20px; }
  svg  { display: block; margin: 0 auto; background: #fff;
         border: 1.5px solid #999; box-shadow: 3px 3px 10px rgba(0,0,0,.15); }

    width: 1040px; margin: 14px auto 0;
    display: flex; gap: 20px; flex-wrap: wrap;
    font-size: 11px; color: #444;

  }
  .legend b { color: #111; }

<body>

<h1>Class Diagram — UC03: Student Management</h1>
<p class="sub">Refactored: Stateless Controller & Boundary Actors</p>

<!--
  AdminView       : nA=0, nM=3  → 75+51 = 126
  StudentView     : nA=0, nM=3  → 75+51 = 126
  StudentManager  : nA=0, nM=12 → 75+204= 279
  Student         : nA=5, nM=5  → 42+85+8+85+8 = 228
  Class           : nA=4, nM=3  → 42+68+8+51+8 = 177
  Enrollment      : nA=5, nM=2  → 42+85+8+34+8 = 177

  AdminView   : (20, 30)
  StudentView : (20, 200)
  StudentMgr  : (250, 50)
  Student     : (590, 20)
  Class       : (590, 280)
  Enrollment  : (830, 150)
-->
<svg width="1050" height="500" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <marker id="mf" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto">
    <polyline points="0,0 10,4.5 0,9" fill="none" stroke="#333" stroke-width="1.4"/>
  </marker>
  <marker id="md" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto">
    <polyline points="0,0 10,4.5 0,9" fill="none" stroke="#333" stroke-width="1.4"/>
  </marker>
</defs>

<!-- ════════ 1. ADMINVIEW «boundary» ════════ -->
<rect x="20"  y="30"  width="200" height="126" fill="#fff" stroke="#333" stroke-width="1.5"/>
<line x1="20"  y1="72"  x2="220" y2="72"  stroke="#333" stroke-width="1.5"/>
<line x1="20"  y1="89"  x2="220" y2="89"  stroke="#333" stroke-width="1.5"/>
<text x="120" y="45"  font-size="10.5" font-style="italic" text-anchor="middle">«boundary»</text>
<text x="120" y="62"  font-size="13"   font-weight="bold"  text-anchor="middle">AdminView</text>
<text x="26"  y="114" font-size="11">+ enrollStudent() : void</text>
<text x="26"  y="131" font-size="11">+ manageStudents() : void</text>
<text x="26"  y="148" font-size="11">+ viewWarnings() : void</text>

<line x1="20"  y1="259" x2="220" y2="259" stroke="#333" stroke-width="1.5"/>
<text x="120" y="215" font-size="10.5" font-style="italic" text-anchor="middle">«boundary»</text>
<text x="120" y="232" font-size="13"   font-weight="bold"  text-anchor="middle">StudentView</text>

<text x="26"  y="301" font-size="11">+ registerClass() : void</text>

<line x1="590" y1="62"  x2="790" y2="62"  stroke="#333" stroke-width="1.5"/>

<!-- ════════ 6. ENROLLMENT «entity» ════════ -->
<rect x="830" y="150" width="200" height="177" fill="#fff" stroke="#333" stroke-width="1.5"/>
<line x1="830" y1="192" x2="1030" y2="192" stroke="#333" stroke-width="1.5"/>
<line x1="830" y1="285" x2="1030" y2="285" stroke="#333" stroke-width="1.5"/>

<!-- Legend -->
<div class="legend">
  <span><b>Access modifiers:</b> &nbsp; <b>+</b> public &nbsp;|&nbsp; <b>−</b> private</span>
  <span>——&gt; Directed Association (open V arrowhead)</span>
  <span><b>1 &nbsp; 0..*</b> — Multiplicity</span>
  <span><b>«boundary»</b> / <b>«control»</b> / <b>«entity»</b> — UML stereotypes</span>
</div>
