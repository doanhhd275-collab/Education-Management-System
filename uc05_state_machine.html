<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>UC05 – State Machine: Learning Support</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Times New Roman', Times, serif; background: #f0ede8; padding: 24px 16px; }
  h1 { text-align: center; font-size: 17px; font-weight: bold; margin-bottom: 4px; color: #111; }
  .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 18px; }
  svg { display: block; margin: 0 auto; background: #fff;
        border: 1.5px solid #999; box-shadow: 3px 3px 10px rgba(0,0,0,.15); }
  .legend { width: 720px; margin: 12px auto 0; display: flex; gap: 18px; flex-wrap: wrap;
            font-size: 11px; color: #444; border-top: 1px solid #bbb; padding-top: 8px; }
</style>
</head>
<body>

<h1>State Machine Diagram — UC05: Learning Support</h1>
<p class="sub">Object: AssignmentReport &nbsp;|&nbsp; Actor: Student / Teacher</p>

<svg width="760" height="700" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <marker id="ma" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
    <polyline points="0,0 9,4.5 0,9" fill="none" stroke="#333" stroke-width="1.4"/>
  </marker>
</defs>

<!-- ═══ INITIAL ● ═══ -->
<circle cx="380" cy="30" r="9" fill="#222"/>

<!-- ═══ STATE: Open ═══ -->
<rect x="292" y="68" width="176" height="60" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<line x1="292" y1="91" x2="468" y2="91" stroke="#333" stroke-width="0.9"/>
<text x="380" y="85" text-anchor="middle" font-size="13" font-weight="bold">Open</text>
<text x="298" y="105" font-size="10" fill="#555">do / accept submissions</text>
<text x="298" y="118" font-size="10" fill="#555">do / track deadline</text>

<!-- Self-loop: viewAssignment() on Open — right side.
     Arc goes from (468,78) → apex ~x=510 → back to (468,100).
     Label placed to the RIGHT of the apex (x>510) -->
<path d="M 468,78 C 530,56 534,112 468,100"
      fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="536" y="68" width="110" height="16" fill="white" stroke="none"/>
<text x="538" y="81" font-size="10.5" font-style="italic">viewAssignment()</text>
<rect x="536" y="86" width="82" height="14" fill="white" stroke="none"/>
<text x="538" y="98" font-size="10" fill="#888">[student views]</text>

<!-- ═══ CHOICE ◇ — deadline check ═══ -->
<polygon points="380,222 414,244 380,266 346,244" fill="#fff" stroke="#333" stroke-width="1.6"/>
<text x="380" y="248" text-anchor="middle" font-size="10" font-style="italic">deadline?</text>

<!-- ═══ STATE: Submitted (on time) ═══ -->
<rect x="62" y="324" width="185" height="60" rx="14" fill="#fff" stroke="#2a7a2a" stroke-width="1.8"/>
<line x1="62" y1="347" x2="247" y2="347" stroke="#2a7a2a" stroke-width="0.9"/>
<text x="155" y="341" text-anchor="middle" font-size="13" font-weight="bold">Submitted</text>
<text x="68" y="361" font-size="10" fill="#555">entry / record timestamp</text>
<text x="68" y="374" font-size="10" fill="#555">do / await grading</text>

<!-- ═══ STATE: Overdue ═══ -->
<rect x="512" y="324" width="185" height="44" rx="14" fill="#fff" stroke="#cc2222" stroke-width="1.8"/>
<text x="605" y="351" text-anchor="middle" font-size="13" font-weight="bold">Overdue</text>

<!-- ═══ STATE: Late Submitted ═══ -->
<rect x="512" y="448" width="185" height="60" rx="14" fill="#fff" stroke="#e87020" stroke-width="1.8"/>
<line x1="512" y1="471" x2="697" y2="471" stroke="#e87020" stroke-width="0.9"/>
<text x="605" y="465" text-anchor="middle" font-size="13" font-weight="bold">Late Submitted</text>
<text x="518" y="485" font-size="10" fill="#555">entry / mark as late</text>
<text x="518" y="498" font-size="10" fill="#555">do / await grading</text>

<!-- ═══ STATE: Under Review ═══ -->
<rect x="292" y="454" width="176" height="60" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<line x1="292" y1="477" x2="468" y2="477" stroke="#333" stroke-width="0.9"/>
<text x="380" y="471" text-anchor="middle" font-size="13" font-weight="bold">Under Review</text>
<text x="298" y="491" font-size="10" fill="#555">do / teacher reviews</text>
<text x="298" y="504" font-size="10" fill="#555">do / prepare feedback</text>

<!-- ═══ STATE: Graded ═══ -->
<rect x="292" y="574" width="176" height="44" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<text x="380" y="601" text-anchor="middle" font-size="13" font-weight="bold">Graded</text>

<!-- ═══ FINAL ◉ ═══ -->
<circle cx="380" cy="664" r="14" fill="none" stroke="#222" stroke-width="2.5"/>
<circle cx="380" cy="664" r="8"  fill="#222"/>

<!-- ══════════ TRANSITIONS ══════════ -->

<!-- T1: ● → Open -->
<line x1="380" y1="39" x2="380" y2="68" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="388" y="42" width="118" height="16" fill="white" stroke="none"/>
<text x="390" y="55" font-size="10.5" font-style="italic">createAssignment()</text>

<!-- T2: Open → Choice -->
<line x1="380" y1="128" x2="380" y2="222" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="388" y="153" width="112" height="16" fill="white" stroke="none"/>
<text x="390" y="166" font-size="10.5" font-style="italic">submitAssignment()</text>
<rect x="388" y="171" width="98" height="14" fill="white" stroke="none"/>
<text x="390" y="183" font-size="10" fill="#888">/ deadline check</text>

<!-- T3: Choice → Submitted [before deadline] -->
<path d="M 346,244 L 222,324" fill="none" stroke="#2a7a2a" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="228" y="275" width="108" height="16" fill="white" stroke="none"/>
<text x="230" y="288" font-size="10.5" font-style="italic" fill="#2a7a2a">[before deadline]</text>

<!-- T4: Choice → Overdue [past deadline] -->
<path d="M 414,244 L 538,324" fill="none" stroke="#cc2222" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="458" y="276" width="94" height="16" fill="white" stroke="none"/>
<text x="460" y="289" font-size="10.5" font-style="italic" fill="#cc2222">[past deadline]</text>

<!-- T5: Overdue → Late Submitted -->
<line x1="605" y1="368" x2="605" y2="448" stroke="#e87020" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="613" y="394" width="112" height="16" fill="white" stroke="none"/>
<text x="615" y="407" font-size="10.5" font-style="italic" fill="#e87020">submitAssignment()</text>
<rect x="613" y="412" width="80" height="14" fill="white" stroke="none"/>
<text x="615" y="424" font-size="10" fill="#888">[late allowed]</text>

<!-- T6: Submitted → Under Review -->
<path d="M 155,384 L 305,472" fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="150" y="416" width="104" height="16" fill="white" stroke="none"/>
<text x="152" y="429" font-size="10.5" font-style="italic">openSubmission()</text>

<!-- T7: Late Submitted → Under Review -->
<path d="M 512,474 L 468,476" fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="474" y="460" width="104" height="16" fill="white" stroke="none"/>
<text x="476" y="473" font-size="10.5" font-style="italic">openSubmission()</text>

<!-- T8: Under Review → Graded -->
<line x1="380" y1="514" x2="380" y2="574" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="388" y="530" width="104" height="16" fill="white" stroke="none"/>
<text x="390" y="543" font-size="10.5" font-style="italic">gradeSubmission()</text>
<rect x="388" y="548" width="96" height="14" fill="white" stroke="none"/>
<text x="390" y="560" font-size="10" fill="#888">[grade assigned]</text>

<!-- T9: Graded → Final -->
<line x1="380" y1="618" x2="380" y2="650" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="388" y="626" width="72" height="16" fill="white" stroke="none"/>
<text x="390" y="639" font-size="10.5" font-style="italic">complete()</text>

<!-- T10: Overdue → Graded (dashed, grade = 0) -->
<path d="M 697,346 C 730,346 730,596 468,596"
      fill="none" stroke="#aa0000" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ma)"/>
<rect x="706" y="454" width="76" height="16" fill="white" stroke="none"/>
<text x="708" y="467" font-size="10" fill="#aa0000" font-style="italic">autoGrade()</text>
<rect x="706" y="472" width="68" height="14" fill="white" stroke="none"/>
<text x="708" y="484" font-size="10" fill="#888">[grade = 0]</text>

</svg>

<div class="legend">
  <span>● Initial pseudostate</span>
  <span>◉ Final pseudostate</span>
  <span>◇ Choice — deadline check</span>
  <span>Green border — On-time submission</span>
  <span>Orange border — Late submission</span>
  <span>Red border — Overdue / penalty</span>
  <span>– –&gt; Auto-grade (dashed)</span>
</div>
</body>
</html>
