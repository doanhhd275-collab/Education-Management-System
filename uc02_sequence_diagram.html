<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>UC02 – Sequence Diagram: Curriculum Management</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Times New Roman', Times, serif; background: #f0ede8; padding: 24px 16px; }
  h1 { text-align: center; font-size: 17px; font-weight: bold; margin-bottom: 4px; color: #111; }
  .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 18px; }
  svg { display: block; margin: 0 auto; background: #fff;
        border: 1.5px solid #999; box-shadow: 3px 3px 10px rgba(0,0,0,.15); }
  .legend { width: 780px; margin: 12px auto 0; display: flex; gap: 18px; flex-wrap: wrap;
            font-size: 11px; color: #444; border-top: 1px solid #bbb; padding-top: 8px; }
</style>
</head>
<body>

<h1>Sequence Diagram — UC02: Curriculum Management</h1>
<p class="sub">Scenario: Create Curriculum · Add Course to Curriculum</p>

<!--
  Participant lifeline centers:
    Admin=90  CurriculumManager=290  CurriculumDB=490  CourseDB=680
  Row spacing: 40px
  Canvas: 780 × 1060
-->
<svg width="780" height="1060" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <!-- filled arrowhead — synchronous call -->
  <marker id="mf" markerWidth="9" markerHeight="8" refX="8.5" refY="4" orient="auto">
    <polygon points="0,0 9,4 0,8" fill="#333"/>
  </marker>
  <!-- open-V arrowhead — return / dashed -->
  <marker id="mr" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
    <polyline points="0,0 9,4.5 0,9" fill="none" stroke="#666" stroke-width="1.3"/>
  </marker>
</defs>

<!-- ══════════════════════════════════════════════════════════
     PARTICIPANT BOXES (top)
     ══════════════════════════════════════════════════════════ -->
<rect x="25"  y="22" width="130" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="90"  y="44" font-size="12" font-weight="bold" text-anchor="middle">Admin</text>

<rect x="220" y="22" width="140" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="290" y="38" font-size="11" font-weight="bold" text-anchor="middle">Curriculum</text>
<text x="290" y="52" font-size="11" font-weight="bold" text-anchor="middle">Manager</text>

<rect x="418" y="22" width="144" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="490" y="44" font-size="12" font-weight="bold" text-anchor="middle">CurriculumDB</text>

<rect x="614" y="22" width="130" height="36" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="679" y="44" font-size="12" font-weight="bold" text-anchor="middle">CourseDB</text>

<!-- ══════════════════════════════════════════════════════════
     LIFELINES
     ══════════════════════════════════════════════════════════ -->
<line x1="90"  y1="58" x2="90"  y2="1008" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="290" y1="58" x2="290" y2="1008" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="490" y1="58" x2="490" y2="1008" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>
<line x1="679" y1="58" x2="679" y2="1008" stroke="#bbb" stroke-width="1.2" stroke-dasharray="7,4"/>

<!-- ══════════════════════════════════════════════════════════
     ACTIVATION BARS
     — Admin & Manager active throughout
     — DB bars drawn ONLY when a message calls them
     ══════════════════════════════════════════════════════════ -->
<!-- Admin active whole time -->
<rect x="85"  y="108" width="10" height="840" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- Manager active whole time -->
<rect x="285" y="108" width="10" height="840" fill="#d6eaff" stroke="#88a" stroke-width="1"/>

<!-- Section 1 DB calls -->
<!-- checkExists: CurriculumDB active y=170..210 -->
<rect x="485" y="170" width="10" height="40" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- save(Curriculum) success branch: CurriculumDB active y=290..330 -->
<rect x="485" y="290" width="10" height="40" fill="#d6eaff" stroke="#88a" stroke-width="1"/>

<!-- Section 2 DB calls -->
<!-- findProgram: CurriculumDB active y=560..600 -->
<rect x="485" y="560" width="10" height="40" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- findCourse: CourseDB active y=610..650 -->
<rect x="674" y="610" width="10" height="40" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- checkExists(programID,courseID): CurriculumDB active y=660..700 -->
<rect x="485" y="660" width="10" height="40" fill="#d6eaff" stroke="#88a" stroke-width="1"/>
<!-- save(CurriculumCourse) success: CurriculumDB active y=760..800 -->
<rect x="485" y="760" width="10" height="40" fill="#d6eaff" stroke="#88a" stroke-width="1"/>

<!-- ══════════════════════════════════════════════════════════
     SECTION 1 — Create Curriculum
     ══════════════════════════════════════════════════════════ -->
<text x="58" y="100" font-size="10.5" fill="#777" font-style="italic">1. Create Curriculum</text>

<!-- 1→ Admin → Manager: createCurriculum -->
<text x="190" y="121" text-anchor="middle" font-size="11">createCurriculum(programID, name)</text>
<line x1="95" y1="130" x2="282" y2="130" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 2→ Manager → CurriculumDB: checkExists -->
<text x="390" y="161" text-anchor="middle" font-size="11">checkExists(programID)</text>
<line x1="295" y1="170" x2="482" y2="170" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 3← CurriculumDB → Manager: return -->
<text x="390" y="201" text-anchor="middle" font-size="10.5" fill="#555">null — not found</text>
<line x1="485" y1="210" x2="298" y2="210" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ALT fragment Section 1 -->
<rect x="58" y="228" width="700" height="200" fill="rgba(220,236,255,0.12)" stroke="#444" stroke-width="1.3"/>
<polygon points="58,228 102,228 102,246 96,253 58,253" fill="#c8e0ff" stroke="#444" stroke-width="1"/>
<text x="64" y="243" font-size="11" font-weight="bold">alt</text>
<text x="108" y="243" font-size="10.5">[programID not exists]</text>

<!-- 4→ Manager → CurriculumDB: save -->
<text x="390" y="281" text-anchor="middle" font-size="11">save(Curriculum)</text>
<line x1="295" y1="290" x2="482" y2="290" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 5← CurriculumDB → Manager: Curriculum object -->
<text x="390" y="321" text-anchor="middle" font-size="10.5" fill="#555">Curriculum object</text>
<line x1="485" y1="330" x2="298" y2="330" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 6← Manager → Admin: 201 Created -->
<text x="190" y="361" text-anchor="middle" font-size="10.5" fill="#555">201 Created</text>
<line x1="285" y1="370" x2="98" y2="370" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ALT separator -->
<line x1="58" y1="390" x2="758" y2="390" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
<text x="64" y="406" font-size="10.5">[programID already exists]</text>

<!-- 7← Manager → Admin: 409 Conflict -->
<text x="190" y="423" text-anchor="middle" font-size="10.5" fill="#555">409 Conflict — Program already exists</text>
<line x1="285" y1="428" x2="98" y2="428" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ══════════════════════════════════════════════════════════
     SECTION 2 — Add Course to Curriculum
     ══════════════════════════════════════════════════════════ -->
<line x1="58" y1="456" x2="730" y2="456" stroke="#ddd" stroke-width="1"/>
<text x="58" y="470" font-size="10.5" fill="#777" font-style="italic">2. Add Course to Curriculum</text>

<!-- 8→ Admin → Manager: addCourse -->
<text x="190" y="493" text-anchor="middle" font-size="11">addCourse(programID, courseID)</text>
<line x1="95" y1="502" x2="282" y2="502" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 9→ Manager → CurriculumDB: findProgram -->
<text x="390" y="551" text-anchor="middle" font-size="11">findProgram(programID)</text>
<line x1="295" y1="560" x2="482" y2="560" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 10← CurriculumDB → Manager: Program object -->
<text x="390" y="591" text-anchor="middle" font-size="10.5" fill="#555">Program object</text>
<line x1="485" y1="600" x2="298" y2="600" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 11→ Manager → CourseDB: findCourse -->
<text x="490" y="601" text-anchor="middle" font-size="11">findCourse(courseID)</text>
<line x1="295" y1="610" x2="671" y2="610" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 12← CourseDB → Manager: Course object -->
<text x="490" y="641" text-anchor="middle" font-size="10.5" fill="#555">Course object</text>
<line x1="674" y1="650" x2="298" y2="650" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 13→ Manager → CurriculumDB: checkExists(programID, courseID) -->
<text x="390" y="651" text-anchor="middle" font-size="11">checkExists(programID, courseID)</text>
<line x1="295" y1="660" x2="482" y2="660" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 14← CurriculumDB → Manager: result -->
<text x="390" y="691" text-anchor="middle" font-size="10.5" fill="#555">null / CurriculumCourse record</text>
<line x1="485" y1="700" x2="298" y2="700" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ALT fragment Section 2 -->
<rect x="58" y="718" width="700" height="172" fill="rgba(220,236,255,0.12)" stroke="#444" stroke-width="1.3"/>
<polygon points="58,718 102,718 102,736 96,743 58,743" fill="#c8e0ff" stroke="#444" stroke-width="1"/>
<text x="64" y="733" font-size="11" font-weight="bold">alt</text>
<text x="108" y="733" font-size="10.5">[not yet in curriculum]</text>

<!-- 15→ Manager → CurriculumDB: save -->
<text x="390" y="761" text-anchor="middle" font-size="11">save(CurriculumCourse)</text>
<line x1="295" y1="770" x2="482" y2="770" stroke="#333" stroke-width="1.4" marker-end="url(#mf)"/>

<!-- 16← CurriculumDB → Manager: CurriculumCourse object -->
<text x="390" y="801" text-anchor="middle" font-size="10.5" fill="#555">CurriculumCourse object</text>
<line x1="485" y1="810" x2="298" y2="810" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- 17← Manager → Admin: 201 Created -->
<text x="190" y="841" text-anchor="middle" font-size="10.5" fill="#555">201 Created — course added</text>
<line x1="285" y1="846" x2="98" y2="846" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ALT separator -->
<line x1="58" y1="864" x2="758" y2="864" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
<text x="64" y="878" font-size="10.5">[already in curriculum]</text>

<!-- 18← Manager → Admin: 400 -->
<text x="190" y="895" text-anchor="middle" font-size="10.5" fill="#555">400 — Course already in curriculum</text>
<line x1="285" y1="900" x2="98" y2="900" stroke="#777" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#mr)"/>

<!-- ══════════════════════════════════════════════════════════
     PARTICIPANT BOXES (bottom)
     ══════════════════════════════════════════════════════════ -->
<rect x="25"  y="1008" width="130" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="90"  y="1036" font-size="12" font-weight="bold" text-anchor="middle">Admin</text>
<rect x="220" y="1008" width="140" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="290" y="1028" font-size="11" font-weight="bold" text-anchor="middle">Curriculum</text>
<text x="290" y="1044" font-size="11" font-weight="bold" text-anchor="middle">Manager</text>
<rect x="418" y="1008" width="144" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="490" y="1036" font-size="12" font-weight="bold" text-anchor="middle">CurriculumDB</text>
<rect x="614" y="1008" width="130" height="44" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
<text x="679" y="1036" font-size="12" font-weight="bold" text-anchor="middle">CourseDB</text>
</svg>

<div class="legend">
  <span>——▶ Synchronous call (filled arrowhead)</span>
  <span>– – –&gt; Return message (dashed, open V)</span>
  <span>┌alt┐ Alternative combined fragment</span>
  <span>░░ Activation bar (only when object is processing)</span>
</div>
</body>
</html>
