<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>UC02 – State Machine: Curriculum Management</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Times New Roman', Times, serif; background: #f0ede8; padding: 24px 16px; }
  h1 { text-align: center; font-size: 17px; font-weight: bold; margin-bottom: 4px; color: #111; }
  .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 18px; }
  svg { display: block; margin: 0 auto; background: #fff;
        border: 1.5px solid #999; box-shadow: 3px 3px 10px rgba(0,0,0,.15); }
  .legend { width: 560px; margin: 12px auto 0; display: flex; gap: 18px; flex-wrap: wrap;
            font-size: 11px; color: #444; border-top: 1px solid #bbb; padding-top: 8px; }
</style>
</head>
<body>

<h1>State Machine Diagram — UC02: Curriculum Management</h1>
<p class="sub">Object: Curriculum &nbsp;|&nbsp; Actor: Admin</p>

<svg width="580" height="640" xmlns="http://www.w3.org/2000/svg"
     font-family="'Times New Roman', Times, serif">
<defs>
  <marker id="ma" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto">
    <polyline points="0,0 9,4.5 0,9" fill="none" stroke="#333" stroke-width="1.4"/>
  </marker>
</defs>

<!-- ═══ INITIAL ● ═══ -->
<circle cx="290" cy="30" r="9" fill="#222"/>

<!-- ═══ STATE: Draft ═══ -->
<rect x="210" y="68" width="160" height="60" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<line x1="210" y1="91" x2="370" y2="91" stroke="#333" stroke-width="0.9"/>
<text x="290" y="85" text-anchor="middle" font-size="13" font-weight="bold">Draft</text>
<text x="216" y="105" font-size="10" fill="#555">entry / init courses list</text>
<text x="216" y="118" font-size="10" fill="#555">do / accept addCourse()</text>

<!-- Self-loop: addCourse() on Draft — right side -->
<path d="M 370,78 C 430,55 434,118 370,108"
      fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<!-- Label clearly to the right of the loop arc -->
<rect x="436" y="70" width="80" height="16" fill="white" stroke="none"/>
<text x="438" y="83" font-size="10.5" font-style="italic">addCourse()</text>
<rect x="436" y="88" width="76" height="14" fill="white" stroke="none"/>
<text x="438" y="100" font-size="10" fill="#888">[more needed]</text>

<!-- ═══ STATE: Published ═══ -->
<rect x="210" y="208" width="160" height="60" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<line x1="210" y1="231" x2="370" y2="231" stroke="#333" stroke-width="0.9"/>
<text x="290" y="225" text-anchor="middle" font-size="13" font-weight="bold">Published</text>
<text x="216" y="245" font-size="10" fill="#555">entry / notify teachers</text>
<text x="216" y="258" font-size="10" fill="#555">do / allow class creation</text>

<!-- ═══ STATE: In Progress ═══ -->
<rect x="210" y="348" width="160" height="60" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<line x1="210" y1="371" x2="370" y2="371" stroke="#333" stroke-width="0.9"/>
<text x="290" y="365" text-anchor="middle" font-size="13" font-weight="bold">In Progress</text>
<text x="216" y="385" font-size="10" fill="#555">do / classes running</text>
<text x="216" y="398" font-size="10" fill="#555">do / track enrollments</text>

<!-- ═══ STATE: Archived ═══ -->
<rect x="210" y="488" width="160" height="60" rx="14" fill="#fff" stroke="#333" stroke-width="1.6"/>
<line x1="210" y1="511" x2="370" y2="511" stroke="#333" stroke-width="0.9"/>
<text x="290" y="505" text-anchor="middle" font-size="13" font-weight="bold">Archived</text>
<text x="216" y="525" font-size="10" fill="#555">entry / close enrollments</text>
<text x="216" y="538" font-size="10" fill="#555">do / read-only access</text>

<!-- ═══ FINAL ◉ ═══ -->
<circle cx="290" cy="608" r="14" fill="none" stroke="#222" stroke-width="2.5"/>
<circle cx="290" cy="608" r="8"  fill="#222"/>

<!-- ══════════ TRANSITIONS ══════════ -->

<!-- T1: ● → Draft -->
<line x1="290" y1="39" x2="290" y2="68" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="298" y="41" width="110" height="16" fill="white" stroke="none"/>
<text x="300" y="54" font-size="10.5" font-style="italic">createCurriculum()</text>

<!-- T2: Draft → Published  [all required courses added] -->
<line x1="290" y1="128" x2="290" y2="208" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="298" y="148" width="108" height="16" fill="white" stroke="none"/>
<text x="300" y="161" font-size="10.5" font-style="italic">allCoursesAdded()</text>
<rect x="298" y="166" width="100" height="14" fill="white" stroke="none"/>
<text x="300" y="178" font-size="10" fill="#888">[courses complete]</text>

<!-- T3: Published → In Progress  openClass() -->
<line x1="290" y1="268" x2="290" y2="348" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="298" y="290" width="80" height="16" fill="white" stroke="none"/>
<text x="300" y="303" font-size="10.5" font-style="italic">openClass()</text>
<rect x="298" y="308" width="108" height="14" fill="white" stroke="none"/>
<text x="300" y="320" font-size="10" fill="#888">[first class opened]</text>

<!-- T4: In Progress → Archived -->
<line x1="290" y1="408" x2="290" y2="488" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="298" y="428" width="60" height="16" fill="white" stroke="none"/>
<text x="300" y="441" font-size="10.5" font-style="italic">archive()</text>
<rect x="298" y="446" width="118" height="14" fill="white" stroke="none"/>
<text x="300" y="458" font-size="10" fill="#888">[all semesters done]</text>

<!-- T5: Archived → Final -->
<line x1="290" y1="548" x2="290" y2="594" stroke="#333" stroke-width="1.4" marker-end="url(#ma)"/>
<rect x="298" y="558" width="118" height="16" fill="white" stroke="none"/>
<text x="300" y="571" font-size="10.5" font-style="italic">deleteCurriculum()</text>

<!-- T6: Published → Draft  removeCourse() (rollback, dashed) -->
<path d="M 210,231 C 140,231 140,98 210,91"
      fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#ma)" stroke-dasharray="5,3"/>
<rect x="48" y="148" width="94" height="16" fill="white" stroke="none"/>
<text x="50" y="161" font-size="10.5" font-style="italic">removeCourse()</text>
<rect x="48" y="166" width="106" height="14" fill="white" stroke="none"/>
<text x="50" y="178" font-size="10" fill="#888">[courses incomplete]</text>

</svg>

<div class="legend">
  <span>● Initial pseudostate</span>
  <span>◉ Final pseudostate</span>
  <span>——&gt; Transition (solid)</span>
  <span>– –&gt; Optional rollback (dashed)</span>
  <span>⟲ Self-loop: addCourse each time</span>
</div>
</body>
</html>
